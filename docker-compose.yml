version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: subscription_db
    environment:
      POSTGRES_DB: subscriptions
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d subscriptions"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: migrate/migrate:v4.17.1
    container_name: subscription_migrate
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://postgres:postgres@db:5432/subscriptions?sslmode=disable",
        "up"
      ]

  app:
    build: .
    container_name: subscription_app
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      HTTP_ADDR: ":8080"
      LOG_LEVEL: "info"
      DATABASE_URL: "postgres://postgres:postgres@db:5432/subscriptions?sslmode=disable"

volumes:
  postgres_data: